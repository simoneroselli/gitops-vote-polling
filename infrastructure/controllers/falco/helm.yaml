apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 1h
  chart:
    spec:
      chart: falco
      version: ">= 4.0.0 < 5.0.0" # Keeps it updated within the major version
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  install:
    crds: CreateReplace
    createNamespace: true
  upgrade:
    crds: CreateReplace
  
  # Imperative helm command values baked directly into GitOps declarations
  values:
    driver:
      kind: modern-ebpf   # Enforces the modern eBPF driver required for k3d

    falco:
      json_output: true   # Formats logs into structured JSON payloads
      http_output:
        enabled: false

    falcoctl:
      artifact:
        install:
          enabled: true
        follow:
          enabled: true
          
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: falcosecurity
  namespace: flux-system # Or the namespace where your infra sources live
spec:
  interval: 2h
  url: https://falcosecurity.github.io/charts