apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 1h
  values:
    env:
      AWS_SECRETSMANAGER_ENDPOINT: "http://host.k3d.internal:4566"
  chart:
    spec:
      chart: external-secrets
      version: "0.9.11" # Standard stable version
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  install:
    crds: CreateReplace   # <-- This forces Flux to install them
  upgrade:
    crds: CreateReplace
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 1h
  url: https://charts.external-secrets.io