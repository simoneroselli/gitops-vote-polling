---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote-frontend
  template:
    metadata:
      labels:
        app: vote-frontend
    spec:
      containers:
      - name: vote
        image: dockersamples/examplevotingapp_vote:before
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "50m"
            memory: "64Mi"
          requests:
            cpu: "250m"
            memory: "128Mi"