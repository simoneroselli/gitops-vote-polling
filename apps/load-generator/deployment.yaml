---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
      - name: load-test
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        # Installs curl, then runs a tight loop executing simultaneous rapid async background calls
        args:
          - |
            apk add --no-cache curl;
            echo "Starting stress engine against vote-frontend...";
            while true; do
              # Fire 20 background workers simultaneously every second
              for i in $(seq 1 20); do
                curl -s -X POST -d "vote=a" http://vote-service:5000/ > /dev/null &
              done
              sleep 0.5;
            done