---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-worker
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote-worker
  template:
    metadata:
      labels:
        app: vote-worker
    spec:
      containers:
      - name: worker
        image: dockersamples/examplevotingapp_worker:before